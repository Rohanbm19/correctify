<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correctify | AI Spell Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <header>
            <h1 class="logo">Correct<span>ify</span></h1>
            <p class="subtitle">Text Autocorrection using Levenshtein Distance</p>
        </header>

        <main>
            <div class="input-card">
                <textarea id="inputText" placeholder="Type or paste your text here..." spellcheck="false"></textarea>
                <div class="actions">
                    <button id="checkBtn" class="primary-btn">
                        <span>Check Spelling</span>
                        <div class="btn-shine"></div>
                    </button>
                    <button id="clearBtn" class="secondary-btn">Clear</button>
                </div>
            </div>

            <div id="resultsSection" class="results-container hidden">
                <h3>Analysis Results</h3>
                <div id="processedText" class="processed-output"></div>
                <div id="suggestionsList" class="suggestions-grid"></div>
            </div>
        </main>
        <footer>
            <p>&copy; 2026 Correctify Project | Built with DP & Levenshtein</p>
        </footer>
    </div>

    <!-- Levenshtein Visualizer Modal -->
    <div id="visualizerModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Algorithm Working</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="visualizer-info">
                    <p>Comparing: <span id="vizWord1"></span> vs <span id="vizWord2"></span></p>
                    <div class="legend">
                        <span class="legend-item"><span class="box match"></span> Match</span>
                        <span class="legend-item"><span class="box sub"></span> Substitution</span>
                        <span class="legend-item"><span class="box ins"></span> Insertion</span>
                        <span class="legend-item"><span class="box del"></span> Deletion</span>
                    </div>
                </div>
                <div class="matrix-wrapper">
                    <table id="dpMatrix"></table>
                </div>
                <div id="explanationBox" class="explanation-box">
                    Hover over a cell to see the calculation steps.
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
